apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: catalunsha
spec:
  statefulSet:
    pod:
      tailscaleContainer:
        resources:
          limits:
            devic.es/tun: "1"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
            add:
              - NET_ADMIN
