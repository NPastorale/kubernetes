apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: plausible
  labels:
    app: plausible
spec:
  serviceName: plausible
  replicas: 1
  selector:
    matchLabels:
      app: plausible
  template:
    metadata:
      labels:
        app: plausible
    spec:
      initContainers:
        - name: plausible-init
          image: ghcr.io/plausible/community-edition:v3.2.1@sha256:33e60bfb40f2df5da00f8753b76fad04f67dba3abe6d73eb516e440e3fb62985
          command:
            - "/bin/sh"
            - "-c"
          args:
            - /entrypoint.sh db createdb && /entrypoint.sh db migrate
          env:
            - name: BASE_URL
              value: "https://plausible.nahue.ar"
            - name: SECRET_KEY_BASE
              value: "GLVzDZW04FzuS1gMcmBRVhwgd4Gu9YmSl/k/TqfTUXti7FLBd7aflXeQDdwCj6Cz"
            - name: DATABASE_URL
              value: postgres://postgres:temp_pass@postgres.postgres.svc.cluster.local:5432/plausible
            - name: CLICKHOUSE_DATABASE_URL
              value: http://test:temppassword@clickhouse.clickhouse.svc.cluster.local:8123/plausible
          securityContext:
            allowPrivilegeEscalation: false
          resources:
            limits:
              memory: 2Gi
              cpu: 1500m
            requests:
              memory: 50Mi
              cpu: 10m
      containers:
        - name: plausible
          image: ghcr.io/plausible/community-edition:v3.2.1@sha256:33e60bfb40f2df5da00f8753b76fad04f67dba3abe6d73eb516e440e3fb62985
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: BASE_URL
              value: "https://plausible.nahue.ar"
            - name: SECRET_KEY_BASE
              value: "GLVzDZW04FzuS1gMcmBRVhwgd4Gu9YmSl/k/TqfTUXti7FLBd7aflXeQDdwCj6Cz"
            - name: DATABASE_URL
              value: postgres://postgres:temp_pass@postgres.postgres.svc.cluster.local:5432/plausible
            - name: CLICKHOUSE_DATABASE_URL
              value: http://test:temppassword@clickhouse.clickhouse.svc.cluster.local:8123/plausible
          securityContext:
            allowPrivilegeEscalation: false
          resources:
            limits:
              memory: 2Gi
              cpu: 1500m
            requests:
              memory: 140Mi
              cpu: 10m
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 35
            failureThreshold: 6
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 45
            failureThreshold: 3
            periodSeconds: 10
