apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: external-dns
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/external-dns/
    chart: external-dns
    targetRevision: 1.21.1
    helm:
      valuesObject:
        revisionHistoryLimit: 0
        sources:
          - service
          - ingress
          - gateway-httproute
        provider:
          name: rfc2136
        domainFilters:
          - podvader.com
          - nahue.ar
        annotationFilter: "external-dns.alpha.kubernetes.io/exclude notin (true)"
        txtSuffix: "-edns"
        enableGatewayListenerSets: true
        extraArgs:
          rfc2136-host: bind-internal.bind9.svc.cluster.local
          rfc2136-port: 53
          rfc2136-zone:
            - podvader.com
            - nahue.ar
          rfc2136-tsig-keyname: ddns-key
          rfc2136-tsig-secret-alg: hmac-sha512
          rfc2136-tsig-axfr: true
        env:
          - name: EXTERNAL_DNS_RFC2136_TSIG_SECRET
            valueFrom:
              secretKeyRef:
                name: ddns-key
                key: ddns-key
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
