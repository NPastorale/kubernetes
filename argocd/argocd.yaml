apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: argo-cd
    helm:
      valuesObject:
        global:
          domain: argocd.nahue.ar
        dex:
          enabled: false
        configs:
          cm:
            resource.customizations.health.argoproj.io_Application: |
              hs = {}
              hs.status = "Progressing"
              hs.message = ""
              if obj.status ~= nil then
                if obj.status.health ~= nil then
                  hs.status = obj.status.health.status
                  if obj.status.health.message ~= nil then
                    hs.message = obj.status.health.message
                  end
                  local syncStatus = (obj.status.sync and obj.status.sync.status or nil)
                  if hs.status == "Healthy" and syncStatus ~= "Synced" then
                    hs.status = "Progressing"
                  end
                end
              end
              return hs
          params:
            server.insecure: true
        server:
          ingress:
            enabled: true
            ingressClassName: internal-nginx
            tls: false
          ingressGrpc:
            enabled: true
            ingressClassName: internal-nginx
            tls: false
          certificate:
            enabled: "false"
            issuer:
              group: "cert-manager.io"
              kind: "ClusterIssuer"
              name: "letsencrypt-prod"
        extraObjects:
          - apiVersion: networking.k8s.io/v1
            kind: Ingress
            metadata:
              name: argocd-server-webhook-ingress
              annotations:
                # cert-manager.io/cluster-issuer: "letsencrypt-prod"
                external-dns.alpha.kubernetes.io/exclude: "true"
            spec:
              ingressClassName: external-nginx
              tls:
                - hosts:
                    - argocd.nahue.ar
                  secretName: argocd-ingress-webhook
              rules:
                - host: argocd.nahue.ar
                  http:
                    paths:
                      - path: /api/webhook
                        pathType: Prefix
                        backend:
                          service:
                            name: argocd-server
                            port:
                              name: http
    repoURL: https://argoproj.github.io/argo-helm
    targetRevision: 9.5.4
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
