apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: cert-manager
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: cert-manager
    helm:
      valuesObject:
        global:
          revisionHistoryLimit: 0
        crds:
          enabled: true
        dns01RecursiveNameservers: "10.10.20.50:53"
        dns01RecursiveNameserversOnly: true
        cainjector:
          enabled: false
        config:
          featureGates:
            ACMEUseARI: true
    repoURL: https://charts.jetstack.io
    targetRevision: v1.21.0
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
